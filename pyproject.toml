[project]
name = "ai-assistant-demo"
version = "0.1.0"
description = "Personal Jarvis-style AI assistant — Phase 1: security spine"
requires-python = ">=3.12"
dependencies = [
    "anthropic",
    "pyjwt[crypto]",
    "psycopg[binary]",
    "httpx",
    "python-dotenv",
]

[dependency-groups]
dev = ["pytest"]

[project.scripts]
assistant = "assistant.cli:main"
fake-tool-server = "toolwrapper.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/assistant", "src/toolwrapper"]
